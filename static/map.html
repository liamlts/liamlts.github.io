<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #161616; overflow: hidden; }
  #map-wrap { width: 100%; height: 100vh; position: relative; }
  #map-wrap img { width: 100%; height: 100%; object-fit: contain; }
  #map-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #tooltip {
    display: none; position: absolute;
    background: rgba(22,22,22,0.97); border: 1px solid #22d3ee;
    border-radius: 8px; padding: 14px 18px; color: #fafafa;
    font-family: system-ui, sans-serif; font-size: 14px;
    max-width: 340px; pointer-events: none; z-index: 10;
    backdrop-filter: blur(8px); box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .dot { cursor: pointer; transition: all 0.2s ease; }
  .dot:hover { filter: drop-shadow(0 0 10px #22d3ee); }
</style>
</head>
<body>
<div id="map-wrap">
<img src="/images/worldmap.png" style="filter: brightness(0.12) saturate(0) hue-rotate(160deg) contrast(1.2);" alt="World map"/>
<svg viewBox="0 0 1920 986" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.12" fill="none">
    <path d="M560,340 Q800,220 1020,310"/>
    <path d="M560,340 Q780,200 990,290"/>
    <path d="M560,340 Q800,230 1005,300"/>
    <path d="M560,340 Q820,180 1015,260"/>
    <path d="M560,340 Q810,240 1030,320"/>
    <path d="M560,340 Q830,200 1040,285"/>
    <line x1="560" y1="340" x2="500" y2="338"/>
    <line x1="560" y1="340" x2="295" y2="345"/>
    <line x1="560" y1="340" x2="545" y2="332"/>
    <line x1="560" y1="340" x2="430" y2="250"/>
  </g>

  <!-- Home: Boston (42.36N, 71.06W) -->
  <circle cx="560" cy="340" r="22" fill="url(#g)"/><circle cx="560" cy="340" r="7" fill="#fff" class="dot" data-f="home"/>
  <!-- NSLS-II Brookhaven (40.87N, 72.87W) -->
  <circle cx="555" cy="348" r="16" fill="url(#g)"/><circle cx="555" cy="348" r="6" fill="#22d3ee" class="dot" data-f="nsls2"/>
  <!-- APS Argonne (41.72N, 87.98W) -->
  <circle cx="500" cy="342" r="16" fill="url(#g)"/><circle cx="500" cy="342" r="6" fill="#22d3ee" class="dot" data-f="aps"/>
  <!-- ALS Berkeley (37.88N, 122.25W) -->
  <circle cx="295" cy="358" r="16" fill="url(#g)"/><circle cx="295" cy="358" r="6" fill="#22d3ee" class="dot" data-f="als"/>
  <!-- CHESS Cornell Ithaca (42.45N, 76.47W) -->
  <circle cx="545" cy="338" r="16" fill="url(#g)"/><circle cx="545" cy="338" r="6" fill="#22d3ee" class="dot" data-f="chess"/>
  <!-- CLS Saskatoon (52.13N, 106.63W) -->
  <circle cx="430" cy="258" r="16" fill="url(#g)"/><circle cx="430" cy="258" r="6" fill="#22d3ee" class="dot" data-f="cls"/>
  <!-- ESRF Grenoble (45.21N, 5.69E) -->
  <circle cx="1020" cy="322" r="16" fill="url(#g)"/><circle cx="1020" cy="322" r="6" fill="#22d3ee" class="dot" data-f="esrf"/>
  <!-- Diamond Oxfordshire (51.57N, 1.32W) -->
  <circle cx="990" cy="292" r="16" fill="url(#g)"/><circle cx="990" cy="292" r="6" fill="#22d3ee" class="dot" data-f="diamond"/>
  <!-- SOLEIL Paris (48.71N, 2.15E) -->
  <circle cx="1005" cy="305" r="16" fill="url(#g)"/><circle cx="1005" cy="305" r="6" fill="#22d3ee" class="dot" data-f="soleil"/>
  <!-- MAX IV Lund (55.73N, 13.25E) -->
  <circle cx="1035" cy="265" r="16" fill="url(#g)"/><circle cx="1035" cy="265" r="6" fill="#22d3ee" class="dot" data-f="maxiv"/>
  <!-- Elettra Trieste (45.65N, 13.85E) -->
  <circle cx="1040" cy="320" r="16" fill="url(#g)"/><circle cx="1040" cy="320" r="6" fill="#22d3ee" class="dot" data-f="elettra"/>
  <!-- TELBE Dresden (51.06N, 13.76E) -->
  <circle cx="1038" cy="290" r="16" fill="url(#g)"/><circle cx="1038" cy="290" r="6" fill="#22d3ee" class="dot" data-f="telbe"/>
</svg>
<div id="tooltip"></div>
</div>

<script>
const F = {
  home: ["Northeastern University", "Boston, MA", "Home — DeLTA Lab, Quantum Matter and Sensing Institute"],
  nsls2: ["NSLS-II", "Brookhaven National Laboratory, NY", "2-ID, SIX · RIXS on altermagnets, vdW magnets, nickelates, frustrated magnets"],
  aps: ["Advanced Photon Source", "Argonne National Laboratory, IL", "Sector 27 · tr-RIXS on Kitaev spin liquids"],
  als: ["Advanced Light Source", "LBNL, Berkeley, CA", "Beamline 4.0.2 · XMCD on altermagnetic thin films"],
  chess: ["CHESS", "Cornell University, NY", "PIPOXS, QM2 · XRD on quantum materials"],
  cls: ["Canadian Light Source", "Saskatoon, Canada", "BXDS · X-ray diffraction"],
  esrf: ["ESRF", "Grenoble, France", "ID32 · High-resolution RIXS on altermagnets and vdW magnets"],
  diamond: ["Diamond Light Source", "Oxfordshire, UK", "I21, I10 · RIXS and XMCD on MnTe, CrSb, Cr-based vdW magnets"],
  soleil: ["SOLEIL", "Saint-Aubin, France", "DEIMOS, SEXTANTS · XMCD and RIXS on altermagnetic and vdW systems"],
  maxiv: ["MAX IV", "Lund, Sweden", "VERITAS · Soft X-ray RIXS on magnetic thin films"],
  elettra: ["Elettra / TeraFERMI", "Trieste, Italy", "TeraFERMI FEL · Time-resolved THz absorption spectroscopy"],
  telbe: ["TELBE", "HZDR, Dresden, Germany", "THz pump-probe and Higgs spectroscopy on superconductors"]
};
const tt = document.getElementById('tooltip');
const wrap = document.getElementById('map-wrap');
document.querySelectorAll('.dot').forEach(d => {
  d.addEventListener('mouseenter', function(e) {
    const f = F[this.dataset.f]; if(!f) return;
    tt.innerHTML = '<strong style="color:#22d3ee;font-size:15px;">' + f[0] + '</strong><br><span style="color:#a1a1aa;font-size:12px;">' + f[1] + '</span><br><span style="margin-top:6px;display:inline-block;line-height:1.4;">' + f[2] + '</span>';
    tt.style.display = 'block';
    const r = wrap.getBoundingClientRect();
    const dr = this.getBoundingClientRect();
    let l = dr.left - r.left + 18, t = dr.top - r.top - 10;
    if (l + 340 > r.width) l = l - 360;
    if (t < 0) t = 10;
    tt.style.left = l + 'px'; tt.style.top = t + 'px';
  });
  d.addEventListener('mouseleave', () => { tt.style.display = 'none'; });
  d.addEventListener('mouseenter', function() { this.setAttribute('r','9'); });
  d.addEventListener('mouseleave', function() { this.setAttribute('r','6'); });
});
</script>
</body>
</html>
