bio: |
  I am a third-year PhD candidate at Northeastern University's Quantum Matter
  and Sensing Institute, working in the DeLTA Lab under Prof. Alberto de la Torre.
  My research focuses on quantum materials — particularly altermagnetism — using
  advanced X-ray spectroscopies (RIXS, XMCD, EXAFS) at international synchrotron
  and free-electron laser facilities.

