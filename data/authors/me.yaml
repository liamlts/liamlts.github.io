experience:
  - role: Graduate Research Assistant — DeLTA Lab
    org: Northeastern University
    start: 2023-09-01
    summary: |
      Lead proposer on beamtime proposals at DOE national user facilities and
      international synchrotrons. Research on altermagnetism in MnTe and CrSb,
      van der Waals magnets, nickelate superconductors, and frustrated magnets.
      Built rotational-anisotropy SHG and transient absorption systems. Developed
      ML models for crystal field parameter extraction from XAS spectra.
  - role: Teaching Assistant
    org: Northeastern University
    start: 2023-09-01
    summary: |
      TA for Electronics Lab, E&M II, Statistical Thermodynamics, Physics for
      Life Sciences, and Physics for Engineers. Mentored 12 undergraduates to
      co-authored publications at ASEE and FYEE 2026.
  - role: Undergraduate Research Assistant
    org: Binghamton University
    start: 2021-09-01
    end: 2023-05-31
    summary: |
      Phase retrieval algorithms for phase contrast imaging. DFT calculations
      using VASP and Quantum ESPRESSO.

